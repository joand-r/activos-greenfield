      #   with:
      #     payload: |
      #       {
      #         "text": "❌ *Backup fallido* en `activos-greenfield`\nWorkflow: ${{ github.workflow }}\nEjecución: ${{ github.run_number }}\nVer detalles: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      #       }
      #   env:
      #     SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      #     SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
