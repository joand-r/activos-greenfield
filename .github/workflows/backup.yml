# =============================================================
#  GitHub Actions — Backup Automatizado de PostgreSQL (Railway)
#
#  • Copia 1 → Railway (snapshots automáticos nativos)
#  • Copia 2 → Este workflow (pg_dump → artefacto de GitHub)
#
#  Ejecución: diaria a las 03:00 AM UTC
#  Retención del artefacto: 90 días (máximo plan gratuito)
# =============================================================

name: 🗄️ PostgreSQL Backup

on:
  schedule:
    # Todos los días a las 03:00 AM UTC
    - cron: '0 3 * * *'

  # Permite ejecutar manualmente desde la pestaña Actions
  workflow_dispatch:

jobs:
  backup:
    name: pg_dump → Artifact
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Instalar cliente PostgreSQL (pg_dump) ──────────────────
      - name: Instalar postgresql-client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client

      # ── 2. Validar que el secret de conexión está configurado ─────
      - name: Validar secret de base de datos
        env:
          RAILWAY_DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${RAILWAY_DATABASE_URL}" ]; then
            echo "❌ El secret RAILWAY_DATABASE_URL no está configurado."
            echo "   Configúralo en: Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "✅ RAILWAY_DATABASE_URL presente"

      # ── 3. Generar el dump comprimido ─────────────────────────────
      - name: Ejecutar pg_dump
        env:
          RAILWAY_DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
        run: |
          set -euo pipefail

          TIMESTAMP=$(date -u +%Y%m%d_%H%M%S)
          FILENAME="backup_${TIMESTAMP}.sql.gz"

          echo "🕐 Iniciando backup: ${FILENAME}"

          pg_dump \
            "${RAILWAY_DATABASE_URL}" \
            --format=plain \
            --no-owner \
            --no-acl \
            --verbose \
          | gzip -9 > "${FILENAME}"

          echo "✅ Dump generado: ${FILENAME} ($(du -sh ${FILENAME} | cut -f1))"
          echo "BACKUP_FILE=${FILENAME}" >> $GITHUB_ENV

      # ── 4. Verificar integridad básica del archivo ────────────────
      - name: Verificar dump
        run: |
          if [ ! -s "${{ env.BACKUP_FILE }}" ]; then
            echo "❌ El archivo de backup está vacío o no existe"
            exit 1
          fi
          echo "✅ Tamaño del backup: $(du -sh ${{ env.BACKUP_FILE }} | cut -f1)"
          gzip -t "${{ env.BACKUP_FILE }}" && echo "✅ Integridad del .gz: OK"

      # ── 5. Guardar como artefacto de GitHub Actions ───────────────
      #  Descargable desde: Actions → ejecución → sección Artifacts
      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 90
