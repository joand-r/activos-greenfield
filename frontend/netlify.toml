# =============================================================
#  Netlify — Configuración de Build + Security Headers
#  Proyecto: activos-greenfield (frontend Next.js)
# =============================================================

[build]
  command   = "npm run build"
  publish   = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# -------------------------------------------------------------
#  Security Headers — aplican a TODAS las rutas
# -------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]

    # Fuerza HTTPS durante 1 año; incluye subdominios
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Impide que el sitio sea cargado en un <iframe> de otro dominio (clickjacking)
    X-Frame-Options = "DENY"

    # El navegador no debe adivinar el tipo MIME declarado
    X-Content-Type-Options = "nosniff"

    # Activa el filtro XSS del navegador (legacy, igual útil en IE/Edge viejos)
    X-XSS-Protection = "1; mode=block"

    # Controla cuánta información de referencia se envía al navegar
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Limita acceso a APIs del navegador (cámara, micrófono, geolocalización, etc.)
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"

    # Content Security Policy
    # connect-src incluye la URL exacta del backend en Railway
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://res.cloudinary.com; connect-src 'self' https://activos-greenfield-backend-production.up.railway.app; font-src 'self'; frame-ancestors 'none';"

# -------------------------------------------------------------
#  Cache — assets estáticos de Next.js (immutable, máximo cache)
# -------------------------------------------------------------
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
